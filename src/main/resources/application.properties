# =============================================
# SERVER — chạy port 8080
# =============================================
server.port=8080

# =============================================
# DATABASE — kết nối SQL Server (cùng DB với BE C#)
# =============================================
# Kết nối SQL Server bằng tài khoản sa (SQL Server Authentication)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ShopQuanAo;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =============================================
# JPA — cấu hình Hibernate (tương đương Entity Framework bên C#)
# =============================================
# none = KHÔNG tự tạo/sửa bảng, vì DB đã tạo sẵn bởi C#
spring.jpa.hibernate.ddl-auto=none
# Hiện câu SQL trong console (để debug)
spring.jpa.show-sql=true
# Chỉ định dialect cho SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# =============================================
# JWT — cùng config với BE C# để verify token
# =============================================
# Phải GIỐNG HỆT với JwtSettings trong appsettings.json bên C#
jwt.secret-key=ShopQuanAo_SuperSecret_Key_2025!@#
jwt.issuer=ShopQuanAoAPI
jwt.audience=ShopQuanAoClient

# =============================================
# PAGINATION — giới hạn phân trang
# =============================================
# Dù FE truyền size bao nhiêu, tối đa chỉ lấy 100 record/trang
spring.data.web.pageable.max-page-size=100

# =============================================
# CLOUDINARY — upload ảnh lên cloud
